<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MAXXFIT LABS research peptide storefront with catalog, lab reports, cart, calculator, tracking, and market-aware checkout."
    />
    <meta name="theme-color" content="#009fac" />
    <meta property="og:title" content="MAXXFIT LABS Research Peptides" />
    <meta property="og:description" content="Research-use-only peptide catalog with lab report access and market-aware ordering." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://maxxfitlabs.com/assets/maxxfit/campaign-board.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>MAXXFIT LABS Research Peptides</title>
    <link rel="icon" href="./assets/maxxfit/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const firstPathSegment = location.pathname.split("/").filter(Boolean)[0] || "";
        const localAssetBase = location.protocol === "file:" ? "." : "";
        window.__APP_BASE__ = location.hostname.endsWith("github.io") && firstPathSegment
          ? "/" + firstPathSegment
          : localAssetBase;
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${window.__APP_BASE__ || ""}/src/styles.css`;
        document.head.append(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const script = document.createElement("script");
        script.src = `${window.__APP_BASE__ || ""}/src/site-bundle.js`;
        script.defer = true;
        document.body.append(script);
      })();
    </script>
  </body>
</html>
